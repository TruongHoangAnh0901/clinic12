<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Phòng Khám Nhóm 12</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #005bea;
            --secondary: #00c6fb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            padding: 30px 15px;
        }

        /* NÚT QUAY LẠI */
        .back-link {
            position: fixed;
            top: 20px;
            left: 25px;
            transition: 0.3s;
            font-size: 1rem;
            z-index: 10;
        }
        .back-link:hover { color: var(--primary) !important; transform: translateX(-4px); }

        /* CARD */
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,91,234,0.15);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
        }

        /* HEADER */
        .login-header {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            padding: 36px 28px;
            text-align: center;
        }
        .login-header .icon-circle {
            width: 75px; height: 75px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 14px;
        }

        /* INPUT — đồng bộ register */
        .form-label { font-weight: 600; font-size: 0.88rem; color: #555; margin-bottom: 6px; }
        .input-group-text {
            background: #f0f4ff;
            border: 1.5px solid #d0d9f0;
            border-right: none;
            color: var(--primary);
        }
        .form-control {
            border: 1.5px solid #d0d9f0;
            background: #f0f4ff;
            transition: 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0,91,234,0.12);
        }
        .form-control.is-invalid { border-color: #dc3545 !important; background: #fff5f5 !important; }

        /* TOGGLE PASSWORD — đồng bộ register */
        .toggle-password {
            border: 1.5px solid #d0d9f0;
            border-left: none;
            background: #f0f4ff;
            color: #999;
            padding: 0 14px;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: 0.2s;
        }
        .toggle-password:hover { color: var(--primary); background: #e0eaff; }

        /* SUBMIT */
        .btn-login {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,91,234,0.35);
            color: white;
        }
        .btn-login:disabled { opacity: 0.7; }

        /* GỢI Ý ĐĂNG NHẬP */
        .login-hint {
            background: #f0f4ff;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
        }
        .login-hint i { color: var(--primary); margin-right: 5px; }
    </style>
</head>
<body>

<a href="/" class="text-decoration-none text-muted fw-bold back-link">
    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
</a>

<div class="login-card">
    <!-- HEADER -->
    <div class="login-header">
        <div class="icon-circle"><i class="fa-solid fa-right-to-bracket"></i></div>
        <h4 class="fw-bold mb-1">Đăng Nhập Hệ Thống</h4>
        <p class="mb-0 opacity-75" style="font-size:0.9rem">Phòng Khám Nhóm 12</p>
    </div>

    <!-- BODY -->
    <div class="card-body p-4 p-md-5 bg-white">
        <div id="messageBox" class="alert d-none mb-4" role="alert"></div>

        <!-- GỢI Ý -->
        <div class="login-hint">
            <i class="fa-solid fa-circle-info"></i>
            Đăng nhập bằng <strong>tên đăng nhập</strong> hoặc <strong>email</strong> đã đăng ký.
        </div>

        <form id="loginForm" novalidate>

            <!-- Tên đăng nhập / Email -->
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập / Email <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control" id="username"
                           placeholder="Nhập tên đăng nhập hoặc email..." required autocomplete="username">
                </div>
            </div>

            <!-- Mật khẩu -->
            <div class="mb-4">
                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="password"
                           placeholder="Nhập mật khẩu..." required style="border-right:none;" autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePwd()" title="Ẩn/hiện mật khẩu">
                        <i class="fa-solid fa-eye" id="eyeIconLogin"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100" id="loginBtn">
                <i class="fa-solid fa-right-to-bracket me-2"></i>ĐĂNG NHẬP
            </button>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted mb-2" style="font-size: 0.85rem;">Hoặc đăng nhập bằng</p>
            <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100" style="border-radius: 50px; font-weight: 600; padding: 10px;">
                <i class="fa-brands fa-google me-2"></i>Google
            </a>
        </div>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="mb-1 text-muted" style="font-size:0.9rem">
                Chưa có tài khoản?
                <a href="register.html" class="fw-bold text-decoration-none text-primary">Đăng ký ngay</a>
            </p>
            <a href="#" class="text-muted text-decoration-none" style="font-size:0.85rem">Quên mật khẩu?</a>
        </div>
    </div>
</div>

<script>
    // Nếu đã đăng nhập thì chuyển về trang chủ
    if (localStorage.getItem("loggedInUser")) { window.location.href = "/"; }

    // ========== ẨN/HIỆN MẬT KHẨU ==========
    function togglePwd() {
        const inp  = document.getElementById('password');
        const icon = document.getElementById('eyeIconLogin');
        inp.type = (inp.type === 'password') ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    }

    // ========== SUBMIT ==========
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const msgBox   = document.getElementById('messageBox');
        const btn      = document.getElementById('loginBtn');

        msgBox.className = 'alert d-none mb-4';

        if (!username || !password) {
            msgBox.className = 'alert alert-warning mb-4';
            msgBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation me-2"></i>Vui lòng điền đầy đủ thông tin!';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-2"></i>Đang xử lý...';

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(async res => {
            if (res.ok) {
                const data = await res.json();

                localStorage.setItem("loggedInUserId", data.userId);
                localStorage.setItem("loggedInUser", data.fullName);
                localStorage.setItem("userRole", data.role);

                msgBox.className = 'alert alert-success mb-4';
                msgBox.innerHTML = '<i class="fa-solid fa-circle-check me-2"></i>Đăng nhập thành công! Đang chuyển hướng...';

                setTimeout(() => {
                    if (data.role === 'ROLE_ADMIN') {
                        window.location.href = '/admin-dashboard.html';
                    } else if (data.role === 'ROLE_DOCTOR') {
                        window.location.href = '/doctor-dashboard.html';
                    } else {
                        window.location.href = '/';
                    }
                }, 1500);
            } else {
                const errorText = await res.text();
                msgBox.className = 'alert alert-danger mb-4';

                // Thông báo lỗi thân thiện hơn
                let msg = errorText;
                if (errorText.includes('không tồn tại')) {
                    msg = '<i class="fa-solid fa-circle-xmark me-2"></i>Tài khoản không tồn tại. Vui lòng kiểm tra lại hoặc <a href="register.html" class="alert-link">đăng ký</a>.';
                } else if (errorText.includes('Sai mật khẩu')) {
                    msg = '<i class="fa-solid fa-circle-xmark me-2"></i>Sai mật khẩu! Vui lòng thử lại.';
                    document.getElementById('password').classList.add('is-invalid');
                } else {
                    msg = '<i class="fa-solid fa-circle-xmark me-2"></i>' + errorText;
                }
                msgBox.innerHTML = msg;

                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>ĐĂNG NHẬP';
            }
        })
        .catch(() => {
            msgBox.className = 'alert alert-danger mb-4';
            msgBox.innerHTML = '<i class="fa-solid fa-plug-circle-xmark me-2"></i>Không thể kết nối đến máy chủ!';
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i>ĐĂNG NHẬP';
        });
    });

    // Xóa is-invalid khi người dùng gõ lại
    document.getElementById('password').addEventListener('input', function() {
        this.classList.remove('is-invalid');
    });
</script>
</body>
</html>
